# Nginx site config for the PDF Converter API.
#
# Install on the server at:  /etc/nginx/sites-available/pdf-converter
# then:  sudo ln -s /etc/nginx/sites-available/pdf-converter /etc/nginx/sites-enabled/
#
# This is the plain HTTP version. After it works, run:
#   sudo certbot --nginx -d yourdomain.com
# Certbot rewrites this file to add the HTTPS (443) server block and an
# HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Allow large PDF uploads (>= MAX_FILE_SIZE_MB).
    client_max_body_size 60M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Conversions can take a while — don't cut long requests short.
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
    }
}
